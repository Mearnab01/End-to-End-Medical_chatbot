<!-- templates/index.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>MediAssist | Clinical Information Chatbot</title>
    <!-- Bootstrap 5 (lighter, modern) + Font Awesome 6 Free -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <!-- Google Fonts: Inter for clean professional typography -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
    <!-- Custom CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="app-container">
      <div class="container h-100">
        <div class="row justify-content-center align-items-center h-100">
          <div class="col-lg-6 col-md-8 col-12">
            <div class="chat-window">
              <!-- Header Section -->
              <div class="chat-header">
                <div class="header-brand">
                  <div class="brand-icon">
                    <i class="fas fa-stethoscope"></i>
                  </div>
                  <div class="brand-text">
                    <h1>MediAssist</h1>
                    <p>Evidence-based clinical assistant</p>
                  </div>
                </div>
                <div class="header-status">
                  <span class="status-indicator"></span>
                  <span>Operational</span>
                </div>
              </div>

              <!-- Messages Container -->
              <div id="chatMessages" class="chat-messages-area">
                <!-- Welcome message will be injected via JS -->
              </div>

              <!-- Input Footer -->
              <div class="chat-input-area">
                <form id="messageForm" class="input-group-custom">
                  <div class="input-wrapper">
                    <input
                      type="text"
                      id="userMessage"
                      class="message-field"
                      placeholder="Describe symptoms or ask a medical question..."
                      autocomplete="off"
                      required
                    />
                    <button
                      type="submit"
                      id="sendButton"
                      class="send-btn"
                      aria-label="Send"
                    >
                      <i class="fas fa-arrow-up"></i>
                    </button>
                  </div>
                </form>
                <div class="disclaimer-note">
                  <i class="fas fa-shield-heart"></i>
                  <span
                    >For informational purposes only. Not a substitute for
                    professional medical advice.</span
                  >
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- Main Vanilla JS -->
    <script src="{{ url_for('static', filename='chat.js') }}"></script>
  </body>
</html>
